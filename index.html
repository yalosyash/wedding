<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>Свадебное приглашение</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* 
            ⚠️ ГЛАВНОЕ: сюда ты вставишь ссылку на фон из Figma
            Как экспортировать фон:
            1. Открой макет в Figma
            2. Выдели слой/группу с фоном (декор, цвет, текстура — без кнопок и форм)
            3. Правой кнопкой → Export → PNG (или WebP, если есть)
            4. Загрузи картинку на любой хостинг (или положи в папку с этим HTML)
            5. Скопируй ссылку и вставь её вместо 'ВАША_ССЫЛКА_НА_ФОН_ИЗ_FIGMA.png'
        */
      .wedding-page {
        /* 👇👇👇 СЮДА ВСТАВЬ ССЫЛКУ НА ЭКСПОРТИРОВАННЫЙ ФОН ИЗ FIGMA 👇👇👇 */
        background-image: url("ВАША_ССЫЛКА_НА_ФОН_ИЗ_FIGMA.png");
        /* Если фон должен покрывать весь экран без искажений: */
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed; /* фиксированный фон при скролле */

        /* Если фон из Figma светлый/тёмный — можно добавить полупрозрачную подложку под текст */
        /* background-color: rgba(0,0,0,0.3);  раскомментируй если нужно затемнить */
        /* background-blend-mode: overlay; */

        min-height: 100vh;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", "Roboto", "Georgia", serif;
      }

      /* Контейнер для интерактивных элементов (они поверх фона) */
      .interactive-content {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(4px);
        border-radius: 48px;
        padding: 2rem 2.5rem;
        max-width: 550px;
        width: 90%;
        text-align: center;
        box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
        transition: all 0.3s ease;
      }

      /* Заголовки и текст — под твой стиль из Figma (поправишь под свой макет) */
      h1 {
        font-size: 2.8rem;
        margin-bottom: 0.5rem;
        color: #3a2c1f;
        letter-spacing: 2px;
      }

      .couple-names {
        font-size: 1.8rem;
        font-weight: 300;
        margin-bottom: 1rem;
        color: #7a4a2a;
      }

      .date {
        font-size: 1.4rem;
        margin: 1rem 0;
        font-weight: 500;
      }

      /* Поля ввода и кнопки — живые, управляются JS */
      input,
      button {
        width: 100%;
        padding: 12px;
        margin-top: 12px;
        border-radius: 60px;
        border: 1px solid #ccc;
        font-size: 1rem;
      }

      button {
        background-color: #b87c4f;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
        border: none;
      }

      button:hover {
        background-color: #9b5e3a;
        transform: scale(0.98);
      }

      #timer {
        font-size: 2rem;
        font-weight: bold;
        margin: 20px 0;
        color: #2c3e2f;
      }

      .rsvp-message {
        margin-top: 15px;
        font-style: italic;
      }

      @media (max-width: 600px) {
        .interactive-content {
          padding: 1.5rem;
        }
        h1 {
          font-size: 2rem;
        }
        .couple-names {
          font-size: 1.4rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="wedding-page">
      <div class="interactive-content">
        <h1>Свадебное приглашение</h1>
        <div class="couple-names">Анна & Алексей</div>
        <div class="date">18 июля 2026 · 15:00</div>

        <!-- Таймер (живой, управляется JS) -->
        <div id="timer">-- дней</div>

        <!-- Форма подтверждения (DOM-элемент, который ты хотел) -->
        <input
          type="text"
          id="guestName"
          placeholder="Ваше имя"
          autocomplete="off"
        />
        <button id="confirmBtn">Подтвердить присутствие</button>
        <div id="message" class="rsvp-message"></div>
      </div>
    </div>

    <script>
      // ========== 1. ТАЙМЕР ДО СВАДЬБЫ ==========
      const weddingDate = new Date(2026, 6, 18, 15, 0, 0); // 18 июля 2026, 15:00 (месяцы в JS: 0=январь, 6=июль)

      function updateTimer() {
        const now = new Date();
        const diff = weddingDate - now;

        if (diff <= 0) {
          document.getElementById("timer").innerHTML = "Сегодня! 💒";
          return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);

        document.getElementById("timer").innerHTML =
          `${days} дн. ${hours} ч. ${minutes} мин.`;
      }
      updateTimer();
      setInterval(updateTimer, 60000); // обновляем каждую минуту

      // ========== 2. КНОПКА ПОДТВЕРЖДЕНИЯ (живой JS) ==========
      const confirmBtn = document.getElementById("confirmBtn");
      const guestNameInput = document.getElementById("guestName");
      const messageDiv = document.getElementById("message");

      confirmBtn.addEventListener("click", () => {
        let name = guestNameInput.value.trim();
        if (name === "") {
          messageDiv.innerHTML = "❓ Пожалуйста, напишите ваше имя";
          messageDiv.style.color = "#b84c2a";
          return;
        }

        // Здесь можно отправить данные на сервер, в Telegram, Google Sheets и т.д.
        // Сейчас просто покажем сообщение.
        messageDiv.innerHTML = `✨ Спасибо, ${name}! Ждём вас на свадьбе ✨`;
        messageDiv.style.color = "#2a6b3c";
        guestNameInput.value = "";

        // Дополнительно можешь добавить сохранение в localStorage
        localStorage.setItem("wedding_guest", name);

        // Имитация отправки (console.log)
        console.log(`[RSVP] ${name} подтвердил участие`);
      });

      // Если гость уже подтверждал раньше — покажем подсказку
      const savedName = localStorage.getItem("wedding_guest");
      if (savedName) {
        messageDiv.innerHTML = `👋 Рады видеть снова, ${savedName}!`;
        messageDiv.style.color = "#7a4a2a";
      }
    </script>
  </body>
</html>
